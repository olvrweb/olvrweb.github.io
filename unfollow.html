<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>olvrleb — unfollow checker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/style.css"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --blue:#2563EB;--blue-l:#EFF6FF;--blue-m:#BFDBFE;--blue-d:#1D4ED8;
      --bg:#F8FAFC;--card:#FFF;--text:#0D1117;--muted:#6B7280;--faint:#9CA3AF;
      --border:#E5E7EB;--red:#EF4444;--red-l:#FEF2F2;--red-m:#FECACA;
      --green:#16A34A;--green-l:#DCFCE7;--green-m:#BBF7D0;
    }
    html{scroll-behavior:smooth}
    body{
      font-family:"Geist Sans",-apple-system,sans-serif;
      background:var(--bg);color:var(--text);
      min-height:100vh;display:flex;flex-direction:column;align-items:center;
    }
    body::before{
      content:'';position:fixed;inset:0;
      background-image:radial-gradient(circle,rgba(0,0,0,.05) 1px,transparent 1px);
      background-size:24px 24px;pointer-events:none;z-index:0;
    }
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    @keyframes pop{0%{transform:scale(.92);opacity:0}100%{transform:scale(1);opacity:1}}

    .back{
      position:fixed;top:1.1rem;left:1.1rem;z-index:50;
      display:inline-flex;align-items:center;gap:.3rem;
      font-family:inherit;font-size:.78rem;font-weight:500;color:var(--faint);
      background:var(--card);border:1px solid var(--border);border-radius:8px;
      padding:.35rem .7rem;cursor:pointer;text-decoration:none;
      transition:color .15s,border-color .15s;
    }
    .back:hover{color:var(--blue);border-color:var(--blue-m)}
    .back svg{width:13px;height:13px}

    .page{
      position:relative;z-index:1;
      width:100%;max-width:820px;
      padding:5rem 1.25rem 4rem;
      display:flex;flex-direction:column;align-items:center;gap:2rem;
      animation:fadeUp .5s .1s ease both;
    }

    .eyebrow{
      display:inline-flex;align-items:center;gap:.35rem;
      font-size:.7rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;
      color:var(--blue);background:var(--blue-l);border:1px solid var(--blue-m);
      padding:.2rem .65rem;border-radius:999px;
    }
    h1{font-size:clamp(2rem,5vw,3rem);font-weight:700;letter-spacing:-.04em;text-align:center;line-height:1.1}
    h1 span{color:var(--blue)}
    .sub{font-size:.9rem;font-weight:300;color:var(--muted);text-align:center;line-height:1.6;max-width:440px}

    .paste-grid{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:1rem}
    @media(max-width:560px){.paste-grid{grid-template-columns:1fr}}

    .paste-card{
      background:var(--card);border:1px solid var(--border);border-radius:14px;
      padding:1.25rem;display:flex;flex-direction:column;gap:.65rem;
    }
    .paste-card-header{display:flex;align-items:center;justify-content:space-between}
    .paste-label{font-size:.78rem;font-weight:700;letter-spacing:-.01em;display:flex;align-items:center;gap:.4rem}
    .paste-label .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .paste-count{font-size:.7rem;font-weight:500;color:var(--faint);background:var(--bg);border:1px solid var(--border);padding:.15rem .5rem;border-radius:999px}

    .paste-area{
      width:100%;height:160px;
      font-family:"Geist Sans",monospace;font-size:.78rem;font-weight:400;color:var(--text);
      background:var(--bg);border:1px solid var(--border);border-radius:9px;
      padding:.7rem .8rem;outline:none;resize:none;line-height:1.6;
      transition:border-color .18s,box-shadow .18s;
    }
    .paste-area:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.08)}
    .paste-area::placeholder{color:var(--faint)}
    .paste-hint{font-size:.68rem;font-weight:300;color:var(--faint);line-height:1.5}

    .actions{display:flex;align-items:center;gap:.75rem}
    .btn-primary{
      font-family:inherit;font-size:.88rem;font-weight:700;color:#fff;
      background:var(--blue);border:none;border-radius:10px;
      padding:.7rem 1.75rem;cursor:pointer;
      display:inline-flex;align-items:center;gap:.45rem;
      transition:background .15s,box-shadow .2s,transform .12s;
    }
    .btn-primary:hover{background:var(--blue-d);box-shadow:0 4px 18px rgba(37,99,235,.3);transform:translateY(-1px)}
    .btn-primary:active{transform:scale(.97)}
    .btn-primary svg{width:16px;height:16px}
    .btn-ghost{
      font-family:inherit;font-size:.82rem;font-weight:500;color:var(--muted);
      background:none;border:1px solid var(--border);border-radius:9px;
      padding:.65rem 1.1rem;cursor:pointer;transition:color .15s,border-color .15s;
    }
    .btn-ghost:hover{color:var(--text);border-color:var(--muted)}

    .results-wrap{width:100%;display:flex;flex-direction:column;gap:1rem;animation:fadeUp .4s ease both}

    .results-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
    .results-title{font-size:1rem;font-weight:700;letter-spacing:-.02em;display:flex;align-items:center;gap:.5rem}
    .results-badge{font-size:.75rem;font-weight:700;padding:.2rem .65rem;border-radius:999px}
    .badge-red  {color:var(--red);  background:var(--red-l);  border:1px solid var(--red-m)}
    .badge-green{color:var(--green);background:var(--green-l);border:1px solid var(--green-m)}

    .copy-btn{
      font-family:inherit;font-size:.75rem;font-weight:500;color:var(--blue);
      background:var(--blue-l);border:1px solid var(--blue-m);border-radius:7px;
      padding:.3rem .75rem;cursor:pointer;transition:background .15s;
      display:inline-flex;align-items:center;gap:.3rem;
    }
    .copy-btn:hover{background:var(--blue-m)}
    .copy-btn svg{width:12px;height:12px}

    .results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:.45rem}

    .result-card{
      display:flex;align-items:center;gap:.55rem;
      background:var(--card);border:1px solid var(--border);border-radius:9px;
      padding:.55rem .7rem;
      transition:border-color .15s,box-shadow .15s;
      animation:pop .25s ease both;
    }
    .result-card:hover{border-color:var(--red-m);box-shadow:0 2px 10px rgba(239,68,68,.07)}
    .result-card.mutual:hover{border-color:var(--green-m);box-shadow:0 2px 10px rgba(22,163,74,.07)}

    .avatar{
      width:32px;height:32px;border-radius:50%;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
      font-size:.85rem;font-weight:700;color:#fff;
    }
    .card-info{min-width:0;flex:1}
    .card-username{font-size:.78rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card-tag{font-size:.64rem;font-weight:500}
    .tag-red{color:var(--red)}
    .tag-green{color:var(--green)}

    .summary-bar{
      width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;
      padding:.85rem 1.1rem;display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;
    }
    .sum-item{display:flex;flex-direction:column;gap:.1rem}
    .sum-val{font-size:1.4rem;font-weight:800;letter-spacing:-.04em}
    .sum-val.red{color:var(--red)}
    .sum-val.green{color:var(--green)}
    .sum-val.blue{color:var(--blue)}
    .sum-label{font-size:.67rem;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:var(--faint)}
    .sum-div{width:1px;height:36px;background:var(--border);align-self:center}

    .results-toolbar{display:flex;align-items:center;gap:.5rem}
    .rsearch-wrap{position:relative;flex:1;max-width:260px}
    .rsi{position:absolute;left:.6rem;top:50%;transform:translateY(-50%);color:var(--faint);pointer-events:none}
    .rsi svg{width:13px;height:13px;display:block}
    .rsearch{
      width:100%;font-family:inherit;font-size:.78rem;color:var(--text);
      background:var(--bg);border:1px solid var(--border);border-radius:7px;
      padding:.38rem .6rem .38rem 1.85rem;outline:none;transition:border-color .18s;
    }
    .rsearch:focus{border-color:var(--blue)}
    .rsearch::placeholder{color:var(--faint)}

    .filter-tabs{display:flex;gap:.3rem}
    .ftab{
      font-family:inherit;font-size:.72rem;font-weight:500;
      background:var(--bg);border:1px solid var(--border);border-radius:6px;
      padding:.28rem .65rem;cursor:pointer;color:var(--muted);transition:all .15s;
    }
    .ftab.active{background:var(--blue);color:#fff;border-color:var(--blue)}
  </style>
</head>
<body>
  <a class="back" href="index.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    back
  </a>

  <div class="page">
    <div class="eyebrow">instagram</div>
    <h1>who doesn't<br><span>follow you back.</span></h1>
    <p class="sub">Paste your following and followers lists below. Everything runs in your browser — nothing is sent anywhere.</p>

    <div class="paste-grid">
      <div class="paste-card">
        <div class="paste-card-header">
          <span class="paste-label">
            <span class="dot" style="background:#2563EB"></span>
            Following
          </span>
          <span class="paste-count" id="following-count">0 users</span>
        </div>
        <textarea class="paste-area" id="following-input"
          placeholder="Paste usernames here, one per line&#10;&#10;@john_doe&#10;@jane_smith&#10;cool_person123&#10;..."
          oninput="updateCount('following-input','following-count')"></textarea>
        <span class="paste-hint">Paste one username per line. @ symbol is optional.</span>
      </div>

      <div class="paste-card">
        <div class="paste-card-header">
          <span class="paste-label">
            <span class="dot" style="background:#16A34A"></span>
            Followers
          </span>
          <span class="paste-count" id="followers-count">0 users</span>
        </div>
        <textarea class="paste-area" id="followers-input"
          placeholder="Paste usernames here, one per line&#10;&#10;@john_doe&#10;@another_user&#10;my_bestfriend&#10;..."
          oninput="updateCount('followers-input','followers-count')"></textarea>
        <span class="paste-hint">Paste one username per line. @ symbol is optional.</span>
      </div>
    </div>

    <div class="actions">
      <button class="btn-primary" onclick="compare()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        compare lists
      </button>
      <button class="btn-ghost" onclick="clearAll()">clear all</button>
    </div>

    <div class="results-wrap" id="results" style="display:none"></div>
  </div>

<script>
  function parseList(raw) {
    const lines = raw.split(/[\n,]+/);
    const users = new Set();
    lines.forEach(l => {
      const clean = l.trim().replace(/^@/, '').toLowerCase();
      if(clean && clean.length >= 1 && !clean.includes(' ')) users.add(clean);
    });
    return users;
  }

  function updateCount(inputId, countId) {
    const raw = document.getElementById(inputId).value;
    const parsed = parseList(raw);
    const count = parsed.size;
    document.getElementById(countId).textContent = count + ' user' + (count===1?'':'s');
  }

  const COLORS = ['#2563EB','#8B5CF6','#EC4899','#EF4444','#F59E0B','#10B981','#06B6D4','#6366F1'];
  function avatarColor(name) { return COLORS[name.charCodeAt(0) % COLORS.length]; }
  function initials(name) { return name.slice(0,2).toUpperCase(); }

  let allNotFollowing = [];
  let allMutual       = [];
  let currentFilter   = 'not-following';
  let searchQuery     = '';

  function compare() {
    const following = parseList(document.getElementById('following-input').value);
    const followers = parseList(document.getElementById('followers-input').value);
    if(following.size === 0 || followers.size === 0) {
      alert('Please paste both your following and followers lists.');
      return;
    }
    const notFollowingBack = [...following].filter(u => !followers.has(u));
    const mutual           = [...following].filter(u =>  followers.has(u));
    renderResults(notFollowingBack, mutual, following.size, followers.size);
  }

  function renderResults(notFollowing, mutual, followingTotal, followersTotal) {
    allNotFollowing = notFollowing.sort();
    allMutual       = mutual.sort();
    const resultsEl = document.getElementById('results');
    resultsEl.style.display = 'flex';
    const ratio = followingTotal > 0 ? Math.round((mutual.length / followingTotal) * 100) : 0;
    resultsEl.innerHTML = `
      <div class="summary-bar">
        <div class="sum-item"><span class="sum-val red">${notFollowing.length}</span><span class="sum-label">not following back</span></div>
        <div class="sum-div"></div>
        <div class="sum-item"><span class="sum-val green">${mutual.length}</span><span class="sum-label">mutual follows</span></div>
        <div class="sum-div"></div>
        <div class="sum-item"><span class="sum-val blue">${followingTotal}</span><span class="sum-label">total following</span></div>
        <div class="sum-div"></div>
        <div class="sum-item"><span class="sum-val">${ratio}%</span><span class="sum-label">follow-back rate</span></div>
      </div>
      <div class="results-header">
        <div class="results-toolbar">
          <div class="filter-tabs">
            <button class="ftab active" id="tab-not" onclick="setFilter('not-following')">Not following back</button>
            <button class="ftab" id="tab-mutual" onclick="setFilter('mutual')">Mutual</button>
          </div>
          <div class="rsearch-wrap">
            <span class="rsi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
            <input type="text" class="rsearch" placeholder="filter results..." oninput="onSearch(this.value)"/>
          </div>
        </div>
        <button class="copy-btn" onclick="copyList()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          copy list
        </button>
      </div>
      <div class="results-grid" id="results-grid"></div>`;
    renderGrid();
    resultsEl.scrollIntoView({behavior:'smooth', block:'start'});
  }

  function setFilter(f) {
    currentFilter = f;
    document.getElementById('tab-not').classList.toggle('active',    f==='not-following');
    document.getElementById('tab-mutual').classList.toggle('active', f==='mutual');
    renderGrid();
  }

  function onSearch(q) { searchQuery = q.toLowerCase().trim(); renderGrid(); }

  function renderGrid() {
    const grid = document.getElementById('results-grid');
    if(!grid) return;
    const list = currentFilter === 'not-following' ? allNotFollowing : allMutual;
    const isMutual = currentFilter === 'mutual';
    const filtered = searchQuery ? list.filter(u=>u.includes(searchQuery)) : list;
    if(!filtered.length) {
      grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:2rem;color:var(--faint);font-size:.85rem;font-weight:300">${searchQuery ? `No results for "${searchQuery}"` : 'None in this category.'}</div>`;
      return;
    }
    const frag = document.createDocumentFragment();
    filtered.forEach((username, i) => {
      const card = document.createElement('div');
      card.className = 'result-card' + (isMutual ? ' mutual' : '');
      card.style.animationDelay = Math.min(i*8,200)+'ms';
      const color = avatarColor(username);
      card.innerHTML = `
        <div class="avatar" style="background:${color}">${initials(username)}</div>
        <div class="card-info">
          <div class="card-username">@${username}</div>
          <div class="card-tag ${isMutual?'tag-green':'tag-red'}">${isMutual?'follows you back':"doesn't follow you"}</div>
        </div>`;
      frag.appendChild(card);
    });
    grid.innerHTML = '';
    grid.appendChild(frag);
  }

  function copyList() {
    const list = currentFilter === 'not-following' ? allNotFollowing : allMutual;
    navigator.clipboard.writeText(list.map(u=>'@'+u).join('\n')).then(()=>{
      const btn = document.querySelector('.copy-btn');
      const orig = btn.innerHTML;
      btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="12" height="12"><polyline points="20 6 9 17 4 12"/></svg> copied!`;
      setTimeout(()=>btn.innerHTML=orig, 1800);
    });
  }

  function clearAll() {
    document.getElementById('following-input').value = '';
    document.getElementById('followers-input').value = '';
    document.getElementById('following-count').textContent = '0 users';
    document.getElementById('followers-count').textContent = '0 users';
    document.getElementById('results').style.display = 'none';
    document.getElementById('results').innerHTML = '';
    allNotFollowing = []; allMutual = [];
  }
</script>
</body>
</html>
