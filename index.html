<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>olvrleb</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/style.css" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

  <div class="progress-bar" id="progress-bar"></div>
  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursor-ring"></div>
  <div class="page-loader" id="loader"></div>

  <nav id="nav">
    <span class="nav-name">olvrleb</span>
    <a href="https://github.com/olvrleb" target="_blank" class="nav-btn">
      <i data-lucide="github"></i><span>github</span>
    </a>
  </nav>

  <section class="hero">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="hero-content" id="hero-content">
      <div class="hero-tag"><i data-lucide="terminal"></i> developer</div>
      <h1 class="hero-handle">
        <span class="bracket left-b">[</span><span id="handle">olvrleb</span><span class="bracket right-b">]</span>
      </h1>
      <p class="hero-sub" id="hero-sub"><span class="tw-cursor">|</span></p>
      <div class="hero-meta">
        <span class="meta-status"><span class="pulse"></span>available</span>
        <span class="sep">/</span>
        <span>oakland, ca</span>
        <span class="sep">/</span>
        <span id="meta-count"></span>
      </div>
      <a href="#projects" class="browse-btn">
        browse <i data-lucide="chevron-down"></i>
      </a>
    </div>
  </section>

  <main id="projects">
    <div class="section-label">
      <span class="label-text"><i data-lucide="layers"></i>selected work</span>
      <div class="label-rule"></div>
    </div>
    <div class="projects-grid" id="projects-grid"></div>
  </main>

  <footer>
    <span class="footer-handle">olvrleb</span>
    <div class="footer-links">
      <a href="https://github.com/olvrleb" target="_blank" aria-label="GitHub"><i data-lucide="github"></i></a>
    </div>
  </footer>

  <script src="projects.js"></script>
  <script src="main.js"></script>
</body>
</html>
