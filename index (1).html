<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oliver LeBlanc</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/style.css" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

  <!-- ── NAV ── -->
  <nav>
    <span class="nav-name">Oliver LeBlanc</span>
    <div class="nav-links">
      <!-- Change the href to your GitHub profile URL -->
      <a href="https://github.com/yourusername" target="_blank" class="nav-btn">
        <i data-lucide="github"></i> GitHub
      </a>
    </div>
  </nav>

  <!-- ── HERO ── -->
  <section class="hero">
    <p class="hero-eyebrow"><i data-lucide="layers"></i> Portfolio</p>
    <h1>Things I've <span class="accent">Built.</span></h1>
    <!-- ↓ Edit this line to change your subtitle -->
    <p class="hero-sub">A collection of personal projects, experiments, and ideas.</p>
  </section>

  <!-- ── PROJECTS GRID (auto-generated from projects.js) ── -->
  <main>
    <div class="projects-grid" id="projects-grid"></div>
  </main>

  <!-- ── FOOTER ── -->
  <footer>
    <p>Built by Oliver LeBlanc &mdash; <a href="https://github.com/yourusername" target="_blank">GitHub</a></p>
  </footer>

  <script src="projects.js"></script>
  <script src="main.js"></script>

</body>
</html>
