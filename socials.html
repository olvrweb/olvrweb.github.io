<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>olvrleb — socials</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/style.css" />
  <script src="shared.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:       #2563EB;
      --blue-glow:  rgba(37,99,235,.18);
      --blue-light: #EFF6FF;
      --blue-mid:   #BFDBFE;
      --bg:         #FAFAFA;
      --card:       #FFFFFF;
      --text:       #0D1117;
      --muted:      #6B7280;
      --faint:      #9CA3AF;
      --border:     #E5E7EB;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: "Geist Sans", -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(circle, rgba(0,0,0,.055) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none; z-index: 0;
    }

    .blob { position: fixed; border-radius: 50%; pointer-events: none; filter: blur(70px); z-index: 0; }
    .blob-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(37,99,235,.09) 0%, transparent 70%);
      top: -150px; left: -150px;
      animation: blob1 9s ease-in-out infinite alternate;
    }
    .blob-2 {
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(99,102,241,.08) 0%, transparent 70%);
      bottom: -80px; right: -80px;
      animation: blob2 11s ease-in-out infinite alternate;
    }
    @keyframes blob1 { from { transform: scale(1); } to { transform: translate(60px,50px) scale(1.1); } }
    @keyframes blob2 { from { transform: scale(1); } to { transform: translate(-50px,-40px) scale(1.12); } }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: none; }
    }

    .page {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      padding: 2.5rem 1.5rem 4rem;
      width: 100%; max-width: 420px;
      animation: fadeUp .6s .1s ease both;
    }

    .back {
      align-self: flex-start;
      display: inline-flex; align-items: center; gap: .35rem;
      font-size: .8rem; font-weight: 500; color: var(--faint);
      text-decoration: none; margin-bottom: 2.5rem; transition: color .15s;
    }
    .back:hover { color: var(--blue); }
    .back::before { content: '←'; font-size: .85rem; }

    .avatar {
      width: 64px; height: 64px; border-radius: 50%;
      background: var(--blue-light); border: 2px solid var(--blue-mid);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 1rem;
      font-size: 1.5rem; font-weight: 700; color: var(--blue);
      letter-spacing: -.03em;
    }

    h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -.04em; margin-bottom: .35rem; }

    .tagline {
      font-size: .88rem; font-weight: 300; color: var(--muted);
      margin-bottom: 2.25rem; text-align: center; line-height: 1.5;
    }

    .socials { display: flex; flex-direction: column; gap: .75rem; width: 100%; }

    .social-card {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 1rem 1.2rem; text-decoration: none; color: var(--text);
      transition: transform .2s, box-shadow .2s, border-color .2s;
      animation: fadeUp .5s ease both;
      position: relative; overflow: hidden;
    }
    .social-card::before {
      content: '';
      position: absolute; inset: 0;
      opacity: 0;
      transition: opacity .25s;
      z-index: 0;
      border-radius: 12px;
    }
    .social-card:hover { transform: translateY(-2px); border-color: transparent; }
    .social-card:hover::before { opacity: 1; }
    .social-card:hover .social-arrow { transform: translate(2px,-2px); }

    .social-card:nth-child(1) { animation-delay: .15s; }
    .social-card:nth-child(2) { animation-delay: .22s; }
    .social-card:nth-child(3) { animation-delay: .29s; }
    .social-card:nth-child(4) { animation-delay: .36s; }
    .social-card:nth-child(5) { animation-delay: .43s; }

    .social-left {
      display: flex; align-items: center; gap: .9rem;
      position: relative; z-index: 1;
    }

    .social-icon-wrap {
      width: 40px; height: 40px; border-radius: 10px;
      background: var(--bg); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: background .2s, border-color .2s;
    }
    .social-icon-wrap svg { width: 18px; height: 18px; color: var(--faint); transition: color .2s; }
    .social-card:hover .social-icon-wrap { background: rgba(255,255,255,.2); border-color: rgba(255,255,255,.3); }
    .social-card:hover .social-icon-wrap svg { color: #fff; }
    .social-card:hover .custom-svg { fill: #fff !important; }

    .social-info { display: flex; flex-direction: column; gap: .12rem; }
    .social-platform { font-size: .88rem; font-weight: 600; color: var(--text); letter-spacing: -.01em; transition: color .2s; }
    .social-handle   { font-size: .78rem; font-weight: 300; color: var(--faint); transition: color .2s; }
    .social-card:hover .social-platform { color: #fff; }
    .social-card:hover .social-handle   { color: rgba(255,255,255,.7); }

    .social-arrow {
      color: var(--faint); transition: color .2s, transform .2s; flex-shrink: 0;
      position: relative; z-index: 1;
    }
    .social-arrow svg { width: 17px; height: 17px; display: block; }
    .social-card:hover .social-arrow { color: rgba(255,255,255,.8); }

    .custom-svg { width: 18px; height: 18px; fill: var(--faint); transition: fill .2s; }

    /* ── Per-platform gradients ── */
    .card-github::before  { background: linear-gradient(135deg, #24292F, #1d4ed8); }
    .card-github:hover    { box-shadow: 0 8px 28px rgba(29,78,216,.3); }

    .card-insta::before   { background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
    .card-insta:hover     { box-shadow: 0 8px 28px rgba(225,48,108,.35); }

    .card-mc::before      { background: linear-gradient(135deg, #16a34a, #15803d); }
    .card-mc:hover        { box-shadow: 0 8px 28px rgba(22,163,74,.3); }

    .card-yt::before      { background: linear-gradient(135deg, #ff0000, #cc0000); }
    .card-yt:hover        { box-shadow: 0 8px 28px rgba(255,0,0,.3); }
    .card-yt:hover .social-icon-wrap { background: rgba(255,255,255,.15); }

    .card-tt::before      { background: linear-gradient(135deg, #010101, #2b6cb0, #ff004f); }
    .card-tt:hover        { box-shadow: 0 8px 28px rgba(43,108,176,.35); }
  </style>
</head>
